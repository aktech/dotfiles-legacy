# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Dotfiles

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
    - name: Generate temporary SSH key
      run: ssh-keygen -t rsa -N "" -f ~/.ssh/temp_key -C "Temporary SSH key for GitHub Actions"
    - name: Initialize dotfiles
      run: |
        pixi run ansible-playbook playbooks/unix.yml -u $(whoami) -c local -i 'localhost,'
